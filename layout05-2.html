<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #wrap {
      }
      #header {
        height: 100px;
        background: #a3a3a3;
      }
      #nav {
        height: 100px;
        background: #727272;
      }
      #main {
      }
      #footer {
        height: 100px;
        background: #615151;
      }
      .container {
        width: 1200px;
        height: inherit;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.5);
      }

      /* main */
      #main .contents {
      }
      #main .contents .left {
        width: 100%;
      }
      #main .contents .left .cont1 {
        width: 100%;
        height: 100px;
        background-color: #ad2a2a;
      }
      #main .contents .right {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
      }
      #main .contents .right .cont2 {
        width: 100%;
        height: 200px;
        background-color: #aadcfa;
      }
      #main .contents .right .cont3 {
        width: 50%;
        height: 480px;
        background-color: #2485c5;
      }
      #main .contents .right .cont4 {
        width: 50%;
        height: 480px;
        background-color: #064a77;
      }

      @media (max-width: 1300px) {
        .container {
          width: 90%;
        }
        #main .contents {
          display: flex;
        }
        #main .contents .left {
          width: 30%;
        }
        #main .contents .left .cont1 {
          height: 780px;
        }
        #main .contents .right {
          width: 70%;
        }
        #main .contents .right .cont2 {
          height: 390px;
        }
        #main .contents .right .cont3 {
          height: 390px;
        }
        #main .contents .right .cont4 {
          height: 390px;
        }
      }
      @media (max-width: 768px) {
        .container {
          width: 100%;
        }
        #main .contents .right .cont2 {
          height: 260px;
        }
        #main .contents .right .cont3 {
          width: 100%;
          height: 260px;
        }
        #main .contents .right .cont4 {
          width: 100%;
          height: 260px;
        }
      }
      @media (max-width: 480px) {
        #main .contents {
          flex-wrap: wrap;
        }
        #main .contents .left {
          width: 100%;
        }
        #main .contents .left .cont1 {
          height: 150px;
        }
        #main .contents .right {
          width: 100%;
        }
        #main .contents .right .cont2 {
          height: 210px;
        }
        #main .contents .right .cont3 {
          height: 210px;
        }
        #main .contents .right .cont4 {
          height: 210px;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="header">
        <div class="container"></div>
      </div>
      <div id="nav">
        <div class="container"></div>
      </div>
      <div id="main">
        <div class="contents container">
          <div class="left">
            <div class="cont1"></div>
          </div>
          <div class="right">
            <div class="cont2"></div>
            <div class="cont3"></div>
            <div class="cont4"></div>
          </div>
        </div>
      </div>
      <div id="footer">
        <div class="container"></div>
      </div>
    </div>
  </body>
</html>
