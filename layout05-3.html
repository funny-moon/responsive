<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #wrap {
      }
      #header {
        height: 100px;
        background: #a3a3a3;
      }
      #nav {
        height: 100px;
        background: #727272;
      }
      #main {
      }
      #footer {
        height: 100px;
        background: #615151;
      }
      .container {
        width: 1200px;
        height: inherit;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.5);
      }

      /* main */
      .contents {
        display: grid;
        grid-template-areas:
          "cont1 cont1"
          "cont2 cont2"
          "cont3 cont4";
        grid-template-columns: 50% 50%;
        grid-template-rows: 100px 200px 480px;
      }
      .contents .cont1 {
        grid-area: cont1;
        background-color: #d466cf;
      }
      .contents .cont2 {
        grid-area: cont2;
        background-color: #f57575;
      }
      .contents .cont3 {
        grid-area: cont3;
        background-color: #a72e2e;
      }
      .contents .cont4 {
        grid-area: cont4;
        background-color: #6b0707;
      }

      @media (max-width: 1300px) {
        .container {
          width: 90%;
        }
        .contents {
          display: grid;
          grid-template-areas:
            "cont1 cont2 cont2"
            "cont1 cont3 cont4";
          /* grid-template-columns: 33.333% 33.333% 33.333%;
          grid-template-rows: 390px 390px; */

          /* grid-template-columns: repeat(3, 33.333%);
          grid-template-rows: repeat(2, 390px); */

          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(2, 390px);
        }
      }
      @media (max-width: 768px) {
        .container {
          width: 100%;
        }
        .contents {
          display: grid;
          grid-template-areas:
            "cont1 cont2"
            "cont1 cont3"
            "cont1 cont4";
          grid-template-columns: 30% 70%;
          grid-template-rows: repeat(3, 260px);
        }
      }
      @media (max-width: 480px) {
        .contents {
          display: grid;
          grid-template-areas:
            "cont1"
            "cont2"
            "cont3"
            "cont4";
          grid-template-columns: 100%;
          grid-template-rows: 150px 210px 210px 210px;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="header">
        <div class="container"></div>
      </div>
      <div id="nav">
        <div class="container"></div>
      </div>
      <div id="main">
        <div class="contents container">
          <div class="cont1"></div>
          <div class="cont2"></div>
          <div class="cont3"></div>
          <div class="cont4"></div>
        </div>
      </div>
      <div id="footer">
        <div class="container"></div>
      </div>
    </div>
  </body>
</html>
