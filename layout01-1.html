<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이아웃01</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: antiquewhite;
      }
      #container {
        width: 1200px;
        margin: 0 auto;
      }
      #header {
        width: 100%;
        height: 100px;
        background-color: #ffd16e;
      }
      #nav {
        width: 100%;
        height: 100px;
        background-color: #ffc13b;
      }
      #aside {
        width: 33%;
        height: 780px;
        background: #ffb30f;
        float: left;
      }
      #section {
        width: 67%;
        height: 780px;
        background: #c48600;
        float: left;
      }
      #footer {
        width: 100%;
        height: 100px;
        background-color: #5e4001;
        clear: both;
      }

      /* 미디어 쿼리 */
      /* 데스크탑, 노트북 */
      @media (max-width: 1300px) {
        #container {
          width: 90%;
        }
      }

      /* 테블릿 */
      @media (max-width: 768px) {
        #container {
          width: 100%;
        }
      }

      /* 모바일 */
      @media (max-width: 480px) {
        #aside {
          width: 100%;
          height: 300px;
        }
        #section {
          width: 100%;
          height: 400px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <header id="header"></header>
      <nav id="nav"></nav>
      <aside id="aside"></aside>
      <section id="section"></section>
      <footer id="footer"></footer>
    </div>
    <!-- float레이아웃 -->
    <!-- 
                      내 width값
    내 width값의 % =  -----------------  X 100   
                      컨테이너 width값


     -->
  </body>
</html>
