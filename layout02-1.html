<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: #999;
      }
      #container {
        width: 1200px;
        margin: 0 auto;
      }
      #header {
        width: 100%;
        height: 100px;
        background: #a1ffc0;
      }
      #nav {
        width: 100%;
        height: 100px;
        background: #1fd108;
      }
      #main {
        width: 100%;
        overflow: hidden;
        /* 자식들이 float속성이 있을때 부모한테 overflow: hidden; */
      }
      #main #aside {
        width: 30%;
        height: 780px;
        background: #29b858;
        float: left;
      }
      #main #section {
        width: 40%;
        height: 780px;
        background: #066927;
        float: left;
      }
      #main #article {
        width: 30%;
        height: 780px;
        background: #4e58b4;
        float: left;
      }
      #footer {
        width: 100%;
        height: 100px;
        background: #00290e;
      }

      /* 미디어 쿼리 */
      @media (max-width: 1300px) {
        #container {
          width: 90%;
        }
      }
      @media (max-width: 768px) {
        #container {
          width: 100%;
        }
        #main #aside {
          width: 40%;
        }
        #main #section {
          width: 60%;
        }
        #main #article {
          width: 100%;
          height: 150px;
        }
      }
      @media (max-width: 480px) {
        #main #aside {
          width: 100%;
          height: 200px;
        }
        #main #section {
          width: 100%;
          height: 430px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header"></div>
      <div id="nav"></div>
      <div id="main">
        <div id="aside"></div>
        <div id="section"></div>
        <div id="article"></div>
      </div>
      <div id="footer"></div>
    </div>
    <!-- float -->
  </body>
</html>
