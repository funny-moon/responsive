<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #header {
        height: 100px;
        background-color: #90ffd1;
      }
      #nav {
        height: 300px;
        background-color: #1fb677;
      }
      #section {
        height: 500px;
        background-color: #03683e;
      }
      #footer {
        height: 100px;
        background-color: #003f25;
      }

      .container {
        width: 1200px;
        height: inherit;
        background-color: rgba(0, 0, 0, 0.5);
        margin: 0 auto;
      }

      /* 미디어 쿼리 */
      @media (max-width: 1300px) {
        .container {
          width: 90%;
        }
      }
      @media (max-width: 768px) {
        .container {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="header">
        <div class="container"></div>
      </div>
      <div id="nav">
        <div class="container"></div>
      </div>
      <div id="section">
        <div class="container"></div>
      </div>
      <div id="footer">
        <div class="container"></div>
      </div>
    </div>
  </body>
</html>
