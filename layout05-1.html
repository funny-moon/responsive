<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #wrap {
      }
      #header {
        height: 100px;
        background-color: red;
      }
      #nav {
        height: 100px;
        background-color: aqua;
      }
      #main {
        height: 780px;
        background-color: blue;
      }
      #footer {
        height: 100px;
        background: rgb(255, 196, 4);
      }
      .container {
        width: 1200px;
        height: inherit;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.5);
      }

      /* .contents {
        overflow: hidden;
      } */

      .cont1 {
        width: 100%;
        height: 100px;
        background: #bd00ce;
        float: left;
      }
      .cont2 {
        width: 100%;
        height: 200px;
        background: #f06ffc;
        float: left;
      }
      .cont3 {
        width: 50%;
        height: 480px;
        background: #bf7dc5;
        float: left;
      }
      .cont4 {
        width: 50%;
        height: 480px;
        background: #f0aff8;
        float: left;
      }

      /* clearfix */
      .clearfix::before,
      .clearfix::after {
        content: "";
        display: block;
        line-height: 0;
      }
      .clearfix::after {
        clear: both;
      }

      @media (max-width: 1300px) {
        .container {
          width: 90%;
        }
        .cont1 {
          width: 30%;
          height: 780px;
        }
        .cont2 {
          width: 70%;
          height: 390px;
        }
        .cont3 {
          width: 35%;
          height: 390px;
        }
        .cont4 {
          width: 35%;
          height: 390px;
        }
      }
      @media (max-width: 768px) {
        .container {
          width: 100%;
        }
        .cont2 {
          width: 70%;
          height: 260px;
        }
        .cont3 {
          width: 70%;
          height: 260px;
        }
        .cont4 {
          width: 70%;
          height: 260px;
        }
      }
      @media (max-width: 480px) {
        .cont1 {
          width: 100%;
          height: 150px;
        }
        .cont2 {
          width: 100%;
          height: 210px;
        }
        .cont3 {
          width: 100%;
          height: 210px;
        }
        .cont4 {
          width: 100%;
          height: 210px;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="header">
        <div class="container"></div>
      </div>
      <div id="nav">
        <div class="container"></div>
      </div>
      <div id="main">
        <div class="contents container clearfix">
          <div class="cont1"></div>
          <div class="cont2"></div>
          <div class="cont3"></div>
          <div class="cont4"></div>
        </div>
      </div>
      <div id="footer">
        <div class="container"></div>
      </div>
    </div>
  </body>
</html>
