<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #999;
      }
      #container {
        width: 1200px;
        margin: 0 auto;
      }
      #header {
        width: 100%;
        height: 100px;
        background-color: #56c1ff;
      }
      #nav {
        width: 100%;
        height: 100px;
        background-color: #1482c2;
      }
      #main {
        width: 100%;
        display: flex;
      }
      #aside {
        width: 30%;
        height: 780px;
        background-color: #acff40;
      }
      #article_inner {
        width: 70%;
      }
      #article1 {
        width: 100%;
        height: 260px;
        background-color: #518310;
      }
      #article2 {
        width: 100%;
      }
      #article2-1 {
        width: 100%;
        height: 260px;
        background-color: #2e4e03;
      }
      #article2-2 {
        width: 100%;
        height: 260px;
        background-color: #1c3100;
      }

      #footer {
        width: 100%;
        height: 100px;
        background-color: #041118;
      }

      /* 미디어 쿼리 */
      @media (max-width: 1300px) {
        #container {
          width: 90%;
        }
        #article2 {
          display: flex;
        }
        #article2-1 {
          width: 50%;
          height: 520px;
        }
        #article2-2 {
          width: 50%;
          height: 520px;
        }
      }
      @media (max-width: 768px) {
        #container {
          width: 100%;
        }
        #article1 {
          height: 390px;
        }
        #article2-1 {
          width: 100%;
          height: 390px;
        }
        #article2-2 {
          display: none;
        }
      }
      @media (max-width: 480px) {
        #main {
          flex-wrap: wrap;
        }
        #aside {
          width: 100%;
          height: 200px;
        }
        #article_inner {
          width: 100%;
        }
        #article1 {
          height: 200px;
        }
        #article2-1 {
          height: 430px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header">header</div>
      <div id="nav">nav</div>
      <div id="main">
        <div id="aside">aside</div>
        <div id="article_inner">
          <div id="article1">article1</div>
          <div id="article2">
            <div id="article2-1">article2</div>
            <div id="article2-2">article3</div>
          </div>
        </div>
      </div>
      <div id="footer">footer</div>
    </div>
  </body>
</html>
