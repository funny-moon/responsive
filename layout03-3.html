<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #999;
      }
      #container {
        width: 1200px;
        margin: 0 auto;
      }
      #header {
        width: 100%;
        height: 100px;
        background-color: #56c1ff;
      }
      #nav {
        width: 100%;
        height: 100px;
        background-color: #1482c2;
      }
      #main {
        width: 100%;
        display: grid;
        grid-template-areas:
          "aside article1 article1"
          "aside article2 article2"
          "aside article3 article3";

        grid-template-columns: 30% 70%;
        grid-template-rows: 260px 260px 260px;
      }
      #aside {
        background-color: #acff40;
        grid-area: aside;
      }
      #article1 {
        background-color: #518310;
        grid-area: article1;
      }
      #article2 {
        background-color: #2e4e03;
        grid-area: article2;
      }
      #article3 {
        background-color: #1c3100;
        grid-area: article3;
      }

      #footer {
        width: 100%;
        height: 100px;
        background-color: #041118;
      }

      /* 미디어 쿼리 */
      @media (max-width: 1300px) {
        #container {
          width: 90%;
        }
        #main {
          grid-template-areas:
            "aside article1 article1"
            "aside article2 article3";

          grid-template-columns: 30% 35% 35%;
          grid-template-rows: 260px 520px;
        }
      }
      @media (max-width: 768px) {
        #container {
          width: 100%;
        }
        #main {
          grid-template-areas:
            "aside article1"
            "aside article2";

          grid-template-columns: 30% 70%;
          grid-template-rows: 390px 390px;
        }
        #article3 {
          display: none;
        }
      }
      @media (max-width: 480px) {
        #main {
          grid-template-areas:
            "aside"
            "article1"
            "article2";

          grid-template-columns: 100%;
          grid-template-rows: 200px 430px 150px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header">header</div>
      <div id="nav">nav</div>
      <div id="main">
        <div id="aside">aside</div>
        <div id="article1">article1</div>
        <div id="article2">article2</div>
        <div id="article3">article3</div>
      </div>
      <div id="footer">footer</div>
    </div>
  </body>
</html>
